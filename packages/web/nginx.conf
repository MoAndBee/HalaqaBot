server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache index.html so Telegram always fetches the latest entry point after deployment
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # Vite produces content-hashed filenames (e.g. assets/index-AbCdEf12.js),
    # so these are safe to cache long-term — a new deployment generates new filenames
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
